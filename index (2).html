<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resume Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Resume Builder</h1>

  <form id="resumeForm" autocomplete="off">
    <input type="text" id="name" placeholder="Your Name" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="tel" id="phone" placeholder="Phone Number" required />
    <textarea id="summary" placeholder="Profile Summary"></textarea>

    <h3>Education</h3>
    <div id="educationSection">
      <button type="button" onclick="addEducation()">+ Add Education</button>
    </div>

    <h3>Skills</h3>
    <input type="text" id="skillInput" placeholder="Type skill and press Enter" />
    <div class="tag-container" id="skillTags"></div>
    
    <h3>Experience</h3>
    <div id="experienceSection">
      <button type="button" onclick="addExperience()">+ Add Experience</button>
    </div>
    <button type="reset" onclick="clearForm()">Clear Form</button>
  </form>

  <button type="button" class="btn" onclick="showPreview()">Show Resume Preview</button>
  <button  type="button" class="btn" onclick="downloadPDF()">Download Resume</button>

  <div id="resumePreview">
    <h2 id="previewName">Your Name</h2>
    <p class="center">
      <span id="previewEmail"></span> | <span id="previewPhone"></span>
    </p>

    <section>
      <h3>Career Objective</h3>
      <p id="previewSummary"></p>
    </section>

    <section>
      <h3>Education</h3>
      <table id="previewEducation">
        <thead>
          <tr>
            <th>Course</th><th>Institute</th><th>Board</th><th>Batch</th><th>CGPA/Marks</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h3>Skills</h3>
      <ul id="previewSkills"></ul>
    </section>

    <section>
      <h3>Experience</h3>
      <ul id="previewExperience"></ul>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
